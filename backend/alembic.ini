# Alembic — schema migrations.
#
# init_db() creates tables from the models on first boot, which is fine for
# development. From the first real deployment onward, Alembic owns the schema:
#
#   alembic revision --autogenerate -m "add customer credit limit"
#   alembic upgrade head
#
# The URL is read from DATABASE_URL at runtime (see migrations/env.py), so the same
# migrations run against SQLite and Postgres without editing this file.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
