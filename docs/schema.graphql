type Mutation {
  login(input: LoginInput!): AuthPayload!

  """Create a business and its first ADMIN, and sign them in."""
  register(input: RegisterInput!): AuthPayload!

  """Rotate a refresh token. The presented token is revoked."""
  refreshToken(refreshToken: String!): AuthPayload!
  logout(refreshToken: String!): MessagePayload!

  """
  Always reports the same thing, registered address or not -- otherwise this endpoint is a free account-enumeration oracle.
  """
  requestPasswordReset(email: String!): MessagePayload!
  resetPassword(input: ResetPasswordInput!): MessagePayload!
  changePassword(input: ChangePasswordInput!): UserType!

  """Self-service. Cannot touch role or is_active."""
  updateProfile(input: ProfileUpdateInput!): UserType!
  updateBusiness(input: BusinessUpdateInput!): BusinessType!
  createUser(input: UserCreateInput!): UserType!
  updateUser(id: ID!, input: UserUpdateInput!): UserType!
  deactivateUser(id: ID!): UserType!
  deleteUser(id: ID!): UserType!

  """Approve a pending store owner. Full access follows at once."""
  approveBusiness(id: ID!): AdminBusinessType!

  """
  Reject a store owner. They keep sign-in but see only the reason; nothing works.
  """
  rejectBusiness(id: ID!, reason: String!): AdminBusinessType!

  """Suspend an approved store owner. Access is revoked immediately."""
  suspendBusiness(id: ID!, reason: String!): AdminBusinessType!

  """
  Re-activate a suspended or rejected store owner (sets the status to APPROVED).
  """
  activateBusiness(id: ID!): AdminBusinessType!

  """PERMANENTLY delete a store owner and ALL their data. Cannot be undone."""
  deleteBusiness(id: ID!): MessagePayload!

  """
  Update platform settings (the W3Forms notification key). SUPER_ADMIN only. Send "" to clear the key; omit the field to leave it unchanged.
  """
  updatePlatformSettings(input: PlatformSettingsInput!): PlatformSettingsType!
  createCustomer(input: CustomerInput!): CustomerType!
  updateCustomer(id: ID!, input: CustomerInput!): CustomerType!

  """Refused while the customer still owes money."""
  deleteCustomer(id: ID!): CustomerType!
  restoreCustomer(id: ID!): CustomerType!
  createCategory(input: CategoryInput!): CategoryType!
  updateCategory(id: ID!, input: CategoryInput!): CategoryType!

  """Members of the category are uncategorised, not deleted."""
  deleteCategory(id: ID!): CategoryType!
  createProduct(input: ProductInput!): ProductType!
  updateProduct(id: ID!, input: ProductInput!): ProductType!
  deleteProduct(id: ID!): ProductType!

  """
  Add to (or subtract from) stock. Stock may go negative on purpose: a stale count must never block a sale -- see models/catalog.py.
  """
  adjustStock(id: ID!, delta: String!, reason: String = null): ProductType!
  createService(input: ServiceInput!): ServiceType!
  updateService(id: ID!, input: ServiceInput!): ServiceType!
  deleteService(id: ID!): ServiceType!
  createCredit(input: CreditCreateInput!): CreditType!
  updateCredit(id: ID!, input: CreditUpdateInput!): CreditType!

  """Refused once money has changed hands -- void the payments first."""
  cancelCredit(id: ID!, reason: String = null): CreditType!

  """
  Refused if payments exist -- cancel it instead, so the ledger survives.
  """
  deleteCredit(id: ID!): CreditType!

  """Restore a credit from the Trash. Admin only."""
  restoreCredit(id: ID!): CreditType!

  """
  Permanently delete a credit that is already in the Trash. Cannot be undone. Admin only.
  """
  permanentlyDeleteCredit(id: ID!): MessagePayload!

  """Overpayment is refused here, at the counter."""
  recordPayment(input: PaymentInput!): PaymentType!

  """
  Reverse a payment WITHOUT erasing it. The reason becomes part of the permanent record.
  """
  voidPayment(id: ID!, reason: String!): PaymentType!

  """
  Send a payment to the Trash. Its amount returns to the credit's balance. Admin only.
  """
  deletePayment(id: ID!): PaymentType!

  """Restore a payment from the Trash. Admin only."""
  restorePayment(id: ID!): PaymentType!

  """
  Permanently delete a payment already in the Trash. Cannot be undone. Admin only.
  """
  permanentlyDeletePayment(id: ID!): MessagePayload!

  """Queue an immediate reminder. The sweep delivers it."""
  sendReminder(creditId: ID!): ScheduledReminderType!
  cancelReminder(id: ID!): ScheduledReminderType!
  updateEmailTemplate(kind: EmailTemplateKind!, input: EmailTemplateInput!): EmailTemplateType!

  """Restore the shipped copy, discarding the owner's edits."""
  resetEmailTemplate(kind: EmailTemplateKind!): EmailTemplateType!

  """Render the template with realistic sample data. Returns HTML."""
  previewEmailTemplate(kind: EmailTemplateKind!): String!
  markNotificationRead(id: ID!): NotificationType!

  """Returns how many were marked read."""
  markAllNotificationsRead: Int!
  archiveNotification(id: ID!): NotificationType!
  deleteNotification(id: ID!): MessagePayload!

  """Runs the export and returns the READY (or FAILED) job."""
  createExport(input: ExportInput!): ExportJobType!

  """Push a scheduled deletion back. The owner's veto."""
  postponeDeletion(batchId: ID!, days: Int! = 30): ArchiveBatchType!

  """Bring an archived batch back into the active lists."""
  restoreArchive(batchId: ID!): ArchiveBatchType!

  """
  Run one maintenance operation. Allowed: clean_temp_files, delete_expired_exports, sweep_orphan_files, vacuum_database, analyze_database, optimize_database, check_integrity, clean_old_logs.
  """
  runMaintenance(operation: String!): MaintenanceResult!
}

