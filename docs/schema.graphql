type Query {
  """The signed-in user, with the permissions their role grants."""
  me: UserType!

  """The caller's own business."""
  business: BusinessType!

  """Every business on the platform. SUPER_ADMIN only."""
  businesses(page: PageInput = null, search: String = null, isActive: Boolean = null): BusinessPage!

  """Staff accounts in the caller's business."""
  users(page: PageInput = null, search: String = null, role: String = null, isActive: Boolean = null): UserPage!

  """Store-owner counts by approval state. SUPER_ADMIN only."""
  adminStats: AdminStats!

  """Every store owner, optionally filtered by status. SUPER_ADMIN only."""
  adminBusinesses(page: PageInput = null, status: ApprovalStatus = null, search: String = null): AdminBusinessPage!

  """One store owner, with its owner and counts. SUPER_ADMIN only."""
  adminBusiness(id: ID!): AdminBusinessType!

  """Platform settings (e.g. the W3Forms key). SUPER_ADMIN only."""
  platformSettings: PlatformSettingsType!

  """
  The W3Forms access key used to email the super-admin when a new store owner signs up. Returned in the clear and WITHOUT authentication ON PURPOSE: a W3Forms access key is a client-side credential -- its only power is to POST a notice to the operator's own inbox, it reads nothing -- and W3Forms' free tier accepts submissions from a browser but rejects them from a server (HTTP 403, 'Pro plan required'). So the register page reads this key and sends the notice itself, client-side. Null when no key is configured (dashboard first, then env).
  """
  registrationNoticeKey: String
  customer(id: ID!): CustomerType!
  customers(filter: CustomerFilterInput = null, page: PageInput = null, sort: SortInput = null): CustomerPage!

  """The 0-100 credit score and the plain-language reasons for it."""
  customerScore(id: ID!): CustomerScore!
  categories(search: String = null): [CategoryType!]!
  product(id: ID!): ProductType!
  products(filter: ProductFilterInput = null, page: PageInput = null, sort: SortInput = null): ProductPage!
  service(id: ID!): ServiceType!
  services(filter: ServiceFilterInput = null, page: PageInput = null, sort: SortInput = null): ServicePage!
  credit(id: ID!): CreditType!

  """Look a credit up by its human reference, e.g. CR-2026-0042."""
  creditByNumber(number: String!): CreditType!
  credits(filter: CreditFilterInput = null, page: PageInput = null, sort: SortInput = null): CreditPage!
  payment(id: ID!): PaymentType!
  payments(filter: PaymentFilterInput = null, page: PageInput = null, sort: SortInput = null): PaymentPage!

  """Credits in the Trash: soft-deleted, recoverable."""
  deletedCredits(page: PageInput = null): CreditPage!

  """Payments in the Trash: soft-deleted, recoverable."""
  deletedPayments(page: PageInput = null): PaymentPage!

  """
  Every payment on a credit, VOIDED ONES INCLUDED -- the ledger is append-only and the UI strikes voids through rather than hiding them.
  """
  paymentHistory(creditId: ID!): [PaymentType!]!

  """Everything the dashboard draws, in one round trip."""
  dashboard: Dashboard!

  """
  Global search across customers (name/phone/code), credits (number), payments (reference/number) and products (name/SKU).
  """
  search(query: String!, limit: Int! = 20): SearchResults!
  notifications(state: NotificationState = null, page: PageInput = null): NotificationPage!

  """Badge count. A COUNT(*), not a fetch."""
  unreadNotificationCount: Int!
  emailTemplates: [EmailTemplateType!]!
  emailTemplate(kind: EmailTemplateKind!): EmailTemplateType!

  """The {{variables}} this template kind may use."""
  templateVariables(kind: EmailTemplateKind!): [TemplateVariableType!]!
  reminders(status: [ReminderStatus!] = null, creditId: ID = null, page: PageInput = null): ReminderPage!
  report(input: ReportInput = null): ReportSummary!
  storageUsage: StorageUsage!
  archiveBatches(page: PageInput = null): ArchiveBatchPage!

  """What the NEXT retention sweep would archive. Nothing is moved."""
  retentionPreview: RetentionPreview!
  exports(page: PageInput = null): ExportJobPage!
  export(id: ID!): ExportJobType!

  """The audit trail. ADMIN and above."""
  auditLogs(page: PageInput = null, entityType: String = null, entityId: ID = null, action: AuditAction = null, search: String = null): AuditLogPage!
}

