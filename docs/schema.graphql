type ReminderPage {
  items: [ScheduledReminderType!]!
  pageInfo: PageInfo!
}

enum ReminderStatus {
  SCHEDULED
  SENT
  FAILED
  SKIPPED
  CANCELLED
}

input ReportInput {
  period: ReportPeriod! = MONTHLY
  startDate: Date = null
  endDate: Date = null
}

enum ReportPeriod {
  DAILY
  WEEKLY
  MONTHLY
  YEARLY
  CUSTOM
}

type ReportRow {
  label: String!
  creditsIssued: String!
  creditsCount: Int!
  collected: String!
  paymentsCount: Int!
}

type ReportSummary {
  period: ReportPeriod!
  startDate: Date!
  endDate: Date!
  totalIssued: String!
  totalIssuedCount: Int!
  totalCollected: String!
  totalCollectedCount: Int!
  outstanding: String!
  overdueAmount: String!
  overdueCount: Int!
  rows: [ReportRow!]!
  topCustomers: [TopCustomer!]!
  byMethod: [MethodBreakdown!]!
}

input ResetPasswordInput {
  token: String!
  newPassword: String!
}

enum RetentionPolicy {
  DAYS_30
  DAYS_60
  DAYS_90
  NEVER
}

type RetentionPreview {
  credits: Int!
  payments: Int!
  records: Int!
  policy: RetentionPolicy!
}

enum Role {
  SUPER_ADMIN
  ADMIN
  STAFF
}

type ScheduledReminderType {
  id: ID!
  creditId: ID!
  customerId: ID!
  audience: ReminderAudience!
  channel: ReminderChannel!
  scheduledFor: Date!
  daysBeforeDue: Int!
  status: ReminderStatus!
  sentAt: DateTime
  attempts: Int!
  lastError: String
}

type SearchHit {
  kind: String!
  id: ID!
  title: String!
  subtitle: String!
  amount: String
  status: String
}

type SearchResults {
  hits: [SearchHit!]!
  total: Int!
}

input ServiceFilterInput {
  search: String = null
  categoryId: ID = null
  isActive: Boolean = null
}

input ServiceInput {
  name: String!
  code: String = null
  description: String = null
  categoryId: ID = null
  price: String! = "0"
  taxPercentage: String = null
  durationMinutes: Int = null
  isActive: Boolean! = true
}

type ServicePage {
  items: [ServiceType!]!
  pageInfo: PageInfo!
}

type ServiceType {
  id: ID!
  name: String!
  code: String
  description: String
  categoryId: ID
  category: CategoryType
  price: String!
  taxPercentage: String
  durationMinutes: Int
  isActive: Boolean!
  createdAt: DateTime!
}

input SortInput {
  field: String! = "created_at"
  desc: Boolean! = true
}

type StorageBreakdown {
  label: String!
  bytes: Int!
  count: Int!
}

type StorageUsage {
  databaseBytes: Int!
  uploadsBytes: Int!
  totalBytes: Int!
  quotaBytes: Int!
  percentUsed: Float!
  overQuota: Boolean!
  bytesSavedByCompression: Int!
  breakdown: [StorageBreakdown!]!
  customerCount: Int!
  creditCount: Int!
  paymentCount: Int!
  productCount: Int!
  serviceCount: Int!
  imageCount: Int!
  exportCount: Int!
}

type TemplateVariableType {
  name: String!
  description: String!
  example: String!
}

type TopCustomer {
  customerId: ID!
  name: String!
  outstanding: String!
  totalCredit: String!
  creditCount: Int!
  creditScore: Int!
}

input UserCreateInput {
  email: String!
  fullName: String!
  password: String!
  role: Role! = STAFF
  phone: String = null
}

type UserPage {
  items: [UserType!]!
  pageInfo: PageInfo!
}

type UserType {
  id: ID!
  email: String!
  fullName: String!
  phone: String
  role: String!
  businessId: ID
  isActive: Boolean!
  avatarUrl: String
  theme: String!
  language: String!
  lastLoginAt: DateTime
  createdAt: DateTime!
  permissions: [String!]!
  approvalStatus: String!
  approvalReason: String
}

input UserUpdateInput {
  fullName: String = null
  phone: String = null
  role: Role = null
  isActive: Boolean = null
}
